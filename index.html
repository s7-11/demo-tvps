<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel HTML TypeScript Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .counter {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
        }

        .count-display {
            font-size: 4rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-decrease {
            background: #ff6b6b;
            color: white;
        }

        .btn-increase {
            background: #4ecdc4;
            color: white;
        }

        .btn-reset {
            background: #95a5a6;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Vercel 部署项目</h1>
        <div class="counter">
            <div class="count-display" id="count">0</div>
            <div class="buttons">
                <button class="btn-decrease" onclick="decrease()">- 减少</button>
                <button class="btn-reset" onclick="reset()">重置</button>
                <button class="btn-increase" onclick="increase()">+ 增加</button>
            </div>
        </div>
        <div class="info">
            使用 TypeScript + HTML 部署到 Vercel
        </div>
    </div>

    <script src="./dist/main.js"></script>
</body>
</html>
